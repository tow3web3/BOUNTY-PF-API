version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bountr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/shared/src/db/migrations/0000_initial.sql:/docker-entrypoint-initdb.d/0000_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bountr
      PAYMENT_ADDRESS: ${PAYMENT_ADDRESS}
      X402_FACILITATOR_URL: ${X402_FACILITATOR_URL:-https://api.cdp.coinbase.com/platform/v2/x402}
      X402_NETWORK: ${X402_NETWORK:-solana:5eykt4UsFv8P8NJdTREpY1vzqKqZKvdp}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PORT: 3000

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bountr
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SCRAPER_DRY_RUN: ${SCRAPER_DRY_RUN:-false}
      SCRAPER_INTERVAL_SECONDS: ${SCRAPER_INTERVAL_SECONDS:-60}

volumes:
  postgres_data:
